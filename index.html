<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Digital og Analog Seniorkalender</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            user-select: none;
            
            /* SIKKERHETSSONE FOR DET FYSISKE DEKSELET (LANDSKAP) */
            padding: 79px 60px 74px 60px; 
            transition: background 1.5s ease, color 1.5s ease;
        }

        /* --- TEMAER --- */
        body.day-mode { 
            background: #f1f5f9; 
            color: #1e293b; 
        }
        body.night-mode { 
            background: #0f172a; 
            color: #f8fafc; 
        }

        /* --- RESPONSIVT LAYOUT MED GRID --- */
        .main-layout {
            display: grid;
            grid-template-columns: 40% 1fr;
            gap: 40px;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* --- VENSTRE HALVDEL: KLOKKER OG DATO --- */
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            padding-right: 10px;
        }

        /* Analog Klokke (Landskap) */
        .analog-clock-svg {
            width: 390px;
            height: 390px;
            max-width: 98%;
        }
        
        .clock-face { fill: none; }
        .tick-minute { stroke: #334155; stroke-width: 0.6; }
        .tick-hour { stroke: #1e293b; stroke-width: 2.8; stroke-linecap: round; }
        .clock-number { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 8.5px; 
            fill: #1e293b; 
            text-anchor: middle; 
            dominant-baseline: middle; 
        }

        .hand { stroke-linecap: round; }
        .hand-hour { stroke: #1e293b; stroke-width: 5.5; }
        .hand-minute { stroke: #1e293b; stroke-width: 4; }
        .hand-second { stroke: #ef4444; stroke-width: 1.3; }
        .center-dot { fill: #ef4444; }

        .night-mode .tick-minute { stroke: #94a3b8; }
        .night-mode .tick-hour, .night-mode .clock-number, .night-mode .hand-hour, .night-mode .hand-minute { fill: #f8fafc; stroke: #f8fafc; }

        /* Digital ur (Landskap) */
        .digital-time {
            font-family: 'Poppins', sans-serif;
            font-size: 9.5vw;
            font-weight: 700;
            line-height: 0.9;
            margin: 5px 0;
            letter-spacing: -4px;
            text-align: center;
        }

        .date-display {
            text-align: center;
            width: 100%;
        }

        .date-text {
            font-family: 'Poppins', sans-serif;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        /* DØGNPERIODE */
        .period-text {
            font-family: 'Poppins', sans-serif; 
            font-size: 32px; 
            font-weight: 700;
            background: #e2e8f0; 
            padding: 10px 40px; 
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: color 1s ease, background 1s ease;
        }
        
        .period-morgen { color: #e11d48; background: #ffe4e6; }       
        .period-formiddag { color: #ea580c; background: #ffedd5; }    
        .period-ettermiddag { color: #991b1b; background: #e2e8f0; }  
        .period-kveld { color: #be123c; background: #ffe4e6; }        
        
        .night-mode .period-text { 
            background: #1e293b; 
            color: #94a3b8; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .night-mode .period-text.period-natt {
            color: #38bdf8; 
            background: #1e293b;
        }

        /* --- HØYRE PANEL: AVTALER --- */
        .right-panel {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 100px; 
            pointer-events: auto !important;
        }
        .right-panel::-webkit-scrollbar { 
            display: none; 
        }

        /* Standard boks for kommende dager */
        .day-section {
            width: 100%;
            margin-bottom: 20px; 
            padding: 24px; 
            border-radius: 16px;
            border: 1px solid #cbd5e1; 
            background-color: transparent;
            position: relative; 
            overflow: hidden;
            transition: background 0.5s ease, border 0.5s ease;
        }
        
        .night-mode .day-section {
            border: 1px solid #334155; 
        }

        /* Markering for I DAG */
        .day-section.today-highlight {
            padding: 24px; 
            background-color: #ffffff; 
            border: 2px solid #ef4444; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); 
            margin-bottom: 30px; 
        }
        
        .night-mode .day-section.today-highlight {
            background-color: #1e293b; 
            border: 2px solid #ef4444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Tittel-linjen bruker Flexbox for ren distribusjon */
        .day-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
